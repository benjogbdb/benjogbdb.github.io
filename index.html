<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="description"
      content="An artistic, minimal portfolio with albums, music, videos, writings, and updates."
    />
    <title>benjo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="home-page">
    <header class="site-header">
      <a class="brand" href="./index.html">benjo</a>
      <nav class="site-nav">
        <a href="./gallery.html">Photography</a>
        <a href="./music.html">Music</a>
        <a href="./videos.html">Videos</a>
        <a href="./writings.html">Writing</a>
        <a href="./updates.html">Updates</a>
      </nav>
    </header>

    <main id="top" class="layout">
      <section class="hero">
        <h1>benjo</h1>

        <button id="music-play-button" class="music-play-button" aria-label="Play music">
          <img
            src="./assets/backgrounds/alien button.jpeg"
            alt="Play music"
            loading="eager"
          />
        </button>
      </section>

      <section class="section">
        <div class="section-head home-head">
          <h2>Enter the archive</h2>
        </div>
        <div class="feature-grid">
          <a class="feature-card" href="./gallery.html">
            <h3>photography</h3>
          </a>
          <a class="feature-card" id="music-hover-link" href="./music.html">
            <h3>music</h3>
          </a>
          <a class="feature-card" href="./videos.html">
            <h3>video</h3>
          </a>
          <a class="feature-card" href="./writings.html">
            <h3>writing</h3>
          </a>
          <a class="feature-card" href="./updates.html">
            <h3>updates</h3>
          </a>
        </div>
      </section>
    </main>

    <audio
      id="music-hover-audio"
      preload="auto"
      style="position: absolute; width: 1px; height: 1px; left: -9999px; top: -9999px; opacity: 0;"
      src="./assets/audio/people are dying and no one cares loopable.mp3"
    ></audio>

    <script>
      (() => {
        const audio = document.getElementById("music-hover-audio");
        const button = document.getElementById("music-play-button");
        if (!audio || !button) return;

        const play = async () => {
          try {
            audio.currentTime = 0;
            audio.muted = false;
            const p = audio.play();
            if (p && typeof p.catch === "function") p.catch(() => {});
          } catch {
            // Ignore (autoplay policy edge cases).
          }
        };

        button.addEventListener("click", () => {
          // Only react to explicit clicks on the play button.
          if (audio.paused) play();
          else audio.pause();
        });
      })();
    </script>
  </body>
</html>
